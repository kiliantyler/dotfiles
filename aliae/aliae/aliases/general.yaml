- name: '_'
  value: 'sudo '
- name: 'python'
  value: 'python3'
- name: 'zshconfig'
  value: 'code ~/.zshrc'
- name: 'fzf'
  value: "fzf --preview 'bat --color=always --style=numbers --line-range=:500 {}'"
- name: 'reload'
  value: 'exec zsh'
- name: 'free'
  value: 'free -m -l -t -h'
- name: 'rm'
  value: 'rm -I --preserve-root'
- name: 'cp'
  value: 'cp -i'
- name: 'mv'
  value: 'mv -i'
- name: 'mkdir'
  value: 'mkdir -p'
- name: 'chown'
  value: 'chown --preserve-root'
- name: 'chmod'
  value: 'chmod --preserve-root'
- name: 'chgrp'
  value: 'chgrp --preserve-root'
- name: 'wget'
  value: 'wget -c'
- name: 'less'
  value: 'most'
- name: 'more'
  value: 'most'
- name: 'cat'
  value: 'bat --paging=never'
- name: 'catc'
  value: 'bat -pp'
- name: 'path'
  value: 'echo -e ${PATH//:/\\n}'
  type: 'function'
- name: 'myip'
  value: 'curl http://ipecho.net/plain; echo'
- name: 'upgrade'
  value: 'topgrade'
- name: 'brew_lock'
  value: "rm -rf $(brew --prefix)/var/homebrew/locks"
- name: 'cls'
  value: 'clear'
- name: 'dps'
  value: 'docker ps --format "table {{.Names}}\t{{.RunningFor}}\t{{.Status}}"'
- name: 'lsblk'
  value: 'lsblk -o NAME,SIZE,FSTYPE,TYPE,MOUNTPOINT'
- name: 'du'
  value: 'dust -w 120'
- name: 'ps'
  value: 'procs'
- name: 'dig'
  value: 'dog'
- name: 'top'
  value: 'btop'
- name: 'yq'
  value: 'yq -P -e -I 2'
- name: 'c'
  value: 'clear'
- name: 'brew'
  value: '.brew'
  if: hasCommand ".brew"
- name: ..
  value: 'cd ..'
- name: '...'
  value: 'cd ../..'
