- name: mc
  type: function
  value: |
    if [ -z "$1" ]; then
      echo "Make directory and enter it"
      echo "Usage: mc <path>"
      return 1
    else
      mkdir -p $1
      cd $1 || exit
    fi
- name: maketar
  type: function
  value: |
    if [ -z "$1" ]; then
      echo "Creates an archive (*.tar.gz) from given directory"
      echo "Usage: maketar <path>"
      return 1
    else
      tar cvzf "${1%%/}.tar.gz" "${1%%/}/"
    fi
- name: makezip
  type: function
  value: |
    if [ -z "$1" ]; then
      echo "Create a ZIP archive of a file or folder"
      echo "Usage: makezip <path>"
      return 1
    else
      zip -r "${1%%/}.zip" "$1"
    fi
- name: pbfile
  type: function
  value: |
    if [ -z "$1" ]; then
      echo "Copies a file to the clipboard (not the contents of the file)"
      echo "Usage: pbfile <path>"
      return 1
    else
      osascript \
        -e 'on run args' \
        -e 'set the clipboard to POSIX file (first item of args)' \
        -e end \
      "$@"
    fi
- name: extract
  type: function
  value: |
    if [ -z "$1" ]; then
      # display usage if no parameters given
      echo "Usage: extract <path/file_name>.<zip|rar|bz2|gz|tar|tbz2|tgz|Z|7z|xz|ex|tar.bz2|tar.gz|tar.xz>"
      echo "       extract <path/file_name_1.ext> [path/file_name_2.ext] [path/file_name_3.ext]"
      return 1
    else
      for n in $@; do
        if [ -f "$n" ]; then
          case "${n%,}" in
          *.tar.bz2 | *.tar.gz | *.tar.xz | *.tbz2 | *.tgz | *.txz | *.tar)
            tar xvf "$n"
            ;;
          *.lzma) unlzma ./"$n" ;;
          *.bz2) bunzip2 ./"$n" ;;
          *.rar) unrar x -ad ./"$n" ;;
          *.gz) gunzip ./"$n" ;;
          *.zip) unzip ./"$n" ;;
          *.z) uncompress ./"$n" ;;
          *.7z | *.arj | *.cab | *.chm | *.deb | *.dmg | *.iso | *.lzh | *.msi | *.rpm | *.udf | *.wim | *.xar)
            7z x ./"$n"
            ;;
          *.xz) unxz ./"$n" ;;
          *.exe) cabextract ./"$n" ;;
          *)
            echo "extract: '$n' - unknown archive method"
            return 1
            ;;
          esac
        else
          echo "'$n' - file does not exist"
          return 1
        fi
      done
    fi
