- name: dt
  value: dotfiles
- name: dotfiles
  type: function
  value: |
    case "$1" in
      edit) .dotfiles_edit && return 0 ;;
      link) .dotfiles_link "$@" && return 0 ;;
      clean) .dotfiles_clean && return 0 ;;
      help) .dotfiles_help && return 0 ;;
      *) .dotfiles_link && .dotfiles_clean && return 0 ;;
    esac
- name: .dotfiles_help
  type: function
  value: |
    echo "Usage: dotfiles [edit|link|clean]"
    echo "  edit: Opens the dotfiles folder in VS Code"
    echo "  link: Links the dotfiles to the home directory"
    echo "        -d | --dir : <folder> | Link a single folder"
    echo "        -v | --verbosity : <verbosity> | Verbosity level (1-7)"
    echo "  help: Prints this message"
    echo "  clean: Removes broken symlinks pointing to the dotfiles"
    echo "  default: Runs link and clean"
- name: .dotfiles_edit
  type: function
  value: |
    code ~/dotfiles || exit 1
- name: .dotfiles_link
  type: function
  value: |
    (
    V=5
    while [[ $# -gt 1 ]]; do
      key="$1"
      case ${key} in
      -v | --verbosity)
        V="${2}"
        shift
        ;;
      -d | --dir)
        stowDir="${2}"
        shift
        ;;
      *) ;;
      esac
      shift
    done
    cd ~/mac-setup/scripts || exit 1
    if [[ -n "${stowDir}" ]]; then
      stowDir="${stowDir%/}"
      V=${V} ./dotfiles.sh -d "${stowDir}" || exit 1
    else
      V=${V} ./dotfiles.sh || exit 1
    fi
    )
- name: .dotfiles_clean
  type: function
  value: |
    local target_folder=~/dotfiles
    # Convert to absolute path to ensure proper string matching
    local absolute_target_folder=$(realpath "$target_folder")

    # Find all symlinks in the home directory
    fd -uat symlink -j 100 -E Library/Containers -E Library/CloudStorage --full-path ~ | while read -r symlink; do
        # Check if the symlink is broken
        if [ ! -e "$symlink" ]; then
          # Get the absolute path of the symlink target
          symlink_target=$(readlink "$symlink")
          symlink_dir=$(dirname "$symlink")
          absolute_symlink_target=$(realpath -m "$symlink_dir/$symlink_target")
          # echo "Broken symlink: $symlink"
          # echo "Target: $absolute_symlink_target"
          if [[ $absolute_symlink_target == $absolute_target_folder* ]]; then
            echo "Removing broken symlink: $symlink"
            command rm -rf "$symlink"
          fi
        fi
    done
