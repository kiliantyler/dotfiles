- name: GOROOT
  value: "{{ .Home }}/.g/go"
- name: G_MIRROR
  value: https://golang.google.cn/dl/
- name: SOPS_AGE_KEY_FILE
  value: "${HOME}/.config/sops/age/keys.txt"
- name: XDG_CONFIG_HOME
  value: "${HOME}/.config"
- name: KUBECONFIG
  value: |
    $(fd . '{{.Home}}/.kube/config-files' | tr \n ':')
- name: YSU_IGNORED_ALIASES
  type: array
  value: |
    _
    ..
    ...
    ....
    .....
    ......
    zi
    apt
    zpl
    zplg
    zini
